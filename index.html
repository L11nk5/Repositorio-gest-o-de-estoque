<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estoque</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff6a00">

<link rel="apple-touch-icon" sizes="180x180" href="logo.png">
<link rel="icon" href="logo.png">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f4f6f8;
}

/* LOGO */
.logo-container {
  text-align: center;
  background: white;
  padding: 10px;
}

.logo-container img {
  max-width: 120px;
}

/* HEADER */
.header {
  background: #ff6a00;
  color: white;
  padding: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* MENU */
.menu {
  position: relative;
}

.menu-btn {
  background: none;
  border: none;
  color: white;
  font-size: 20px;
}

.menu-content {
  display: none;
  position: absolute;
  right: 0;
  top: 30px;
  background: white;
  color: black;
  border-radius: 8px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.2);
  overflow: hidden;
}

.menu-content button {
  width: 100%;
  border: none;
  padding: 10px;
  background: white;
}

.menu-content button:hover {
  background: #eee;
}

/* DASHBOARD */
.dashboard {
  padding: 10px;
}

.card-info {
  background: white;
  padding: 15px;
  border-radius: 12px;
  text-align: center;
  margin-bottom: 10px;
}

/* LISTA */
.list-item {
  display: flex;
  align-items: center;
  background: white;
  margin: 10px;
  padding: 10px;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.list-item img {
  width: 50px;
  height: 50px;
  border-radius: 8px;
  object-fit: cover;
}

.info {
  flex: 1;
  padding: 0 10px;
}

.qtd-buttons {
  display: flex;
  flex-direction: column;
}

.qtd-buttons button {
  background: #ff6a00;
  color: white;
  border: none;
  margin: 2px 0;
  border-radius: 5px;
  width: 35px;
  height: 30px;
}

/* FAB */
.fab {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #ff6a00;
  color: white;
  font-size: 28px;
  border: none;
  border-radius: 50%;
  width: 60px;
  height: 60px;
}

/* MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  background: rgba(0,0,0,0.5);
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: white;
  width: 90%;
  max-width: 400px;
  border-radius: 15px;
  padding: 20px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
}

button {
  padding: 10px;
}
</style>
</head>

<body>

<div class="logo-container">
  <img src="logo.png">
</div>

<div class="header">
  <div>📦 Estoque</div>

  <div class="menu">
    <button class="menu-btn" onclick="toggleMenu()">⋮</button>
    <div id="menu" class="menu-content">
      <button onclick="exportData()">Exportar</button>
      <button onclick="document.getElementById('fileInput').click()">Importar</button>
    </div>
  </div>
</div>

<input type="file" id="fileInput" style="display:none" onchange="importData(event)">

<div class="dashboard">
  <div class="card-info">
    <h3 id="total">0</h3>
    <p>Total de itens</p>
  </div>
</div>

<div id="list"></div>

<button class="fab" onclick="openAdd()">+</button>

<!-- MODAL ADD -->
<div id="addModal" class="modal" onclick="closeAdd()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <h3>Novo Produto</h3>
    <input id="name" placeholder="Nome">
    <input id="qty" type="number" placeholder="Quantidade">
    <input id="image" type="file">
    <button onclick="add()">Salvar</button>
  </div>
</div>

<!-- MODAL DETALHE -->
<div id="modal" class="modal" onclick="closeModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div id="modalContent"></div>
  </div>
</div>

<script>
let db = JSON.parse(localStorage.getItem("estoque") || "[]");

function save() {
  localStorage.setItem("estoque", JSON.stringify(db));
}

/* MENU */
function toggleMenu() {
  const menu = document.getElementById("menu");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

/* EXPORT */
function exportData() {
  const blob = new Blob([JSON.stringify(db)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "estoque.json";
  a.click();
}

/* IMPORT */
function importData(event) {
  const file = event.target.files[0];
  const reader = new FileReader();

  reader.onload = e => {
    const data = JSON.parse(e.target.result);
    if(confirm("Substituir estoque atual?")) {
      db = data;
      save();
      render();
    }
  };

  reader.readAsText(file);
}

/* ADD */
function openAdd() {
  document.getElementById("addModal").style.display = "flex";
}

function closeAdd() {
  document.getElementById("addModal").style.display = "none";
}

function add() {
  const name = document.getElementById("name").value;
  const qty = parseInt(document.getElementById("qty").value);
  const file = document.getElementById("image").files[0];

  if (!name || !qty) return alert("Preencha");

  const reader = new FileReader();

  reader.onload = () => {
    db.push({ id: Date.now(), name, qty, image: reader.result });
    save();
    render();
    closeAdd();
  };

  if(file) reader.readAsDataURL(file);
  else reader.onload();
}

/* LISTA */
function render() {
  const list = document.getElementById("list");
  const total = document.getElementById("total");

  list.innerHTML = "";

  let soma = 0;

  db.forEach(p => {
    soma += p.qty;

    list.innerHTML += `
      <div class="list-item" onclick="openModal(${p.id})">
        ${p.image ? `<img src="${p.image}">` : ""}

        <div class="info">
          <b>${p.name}</b>
          <p>Qtd: ${p.qty}</p>
        </div>

        <div class="qtd-buttons">
          <button onclick="event.stopPropagation(); inc(${p.id})">+</button>
          <button onclick="event.stopPropagation(); dec(${p.id})">-</button>
        </div>
      </div>
    `;
  });

  total.innerText = soma;
}

/* QTD */
function inc(id) {
  db.find(p => p.id === id).qty++;
  save();
  render();
}

function dec(id) {
  let p = db.find(p => p.id === id);
  if(p.qty > 0) p.qty--;
  save();
  render();
}

/* MODAL */
function openModal(id) {
  const p = db.find(p => p.id === id);

  document.getElementById("modal").style.display = "flex";

  document.getElementById("modalContent").innerHTML = `
    ${p.image ? `<img src="${p.image}" style="width:100%">` : ""}
    <h2>${p.name}</h2>

    <div style="display:flex; justify-content:center; gap:10px;">
      <button onclick="inc(${p.id}); openModal(${p.id})">+</button>
      <b>${p.qty}</b>
      <button onclick="dec(${p.id}); openModal(${p.id})">-</button>
    </div>

    <button onclick="confirmDelete(${p.id})" style="background:red;color:white;margin-top:10px;">
      Deletar
    </button>
  `;
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

function confirmDelete(id) {
  if(confirm("Tem certeza?")) {
    db = db.filter(p => p.id !== id);
    save();
    render();
    closeModal();
  }
}

render();

/* SW */
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
