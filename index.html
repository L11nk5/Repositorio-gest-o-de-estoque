<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estoque</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff6a00">

<!-- Ícone iPhone -->
<link rel="apple-touch-icon" sizes="180x180" href="logo.png">

<!-- Favicon -->
<link rel="icon" href="./logo.png" type="image/png">
<link rel="shortcut icon" href="./logo.png">

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f4f4f4;
}

.logo-container {
  display: flex;
  justify-content: center;
  padding: 15px;
  background: white;
}

.logo-container img {
  max-width: 180px;
}

header {
  background: #ff6a00;
  color: white;
  padding: 10px;
  text-align: center;
}

.container {
  padding: 10px;
}

input, button {
  width: 100%;
  margin: 5px 0;
  padding: 10px;
  font-size: 16px;
}

button {
  background: #ff6a00;
  color: white;
  border: none;
  border-radius: 6px;
}

.card {
  background: white;
  padding: 10px;
  margin: 10px 0;
  border-radius: 8px;
}

img {
  width: 100%;
  border-radius: 8px;
}

/* NOVO - botões de quantidade */
.qtd-control {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin: 10px 0;
}

.qtd-control button {
  width: 40px;
  padding: 5px;
  font-size: 18px;
}
</style>
</head>

<body>

<div class="logo-container">
  <img src="./logo.png" alt="Logo">
</div>

<header>
  <h3>📦 Estoque</h3>
</header>

<div class="container">

<input id="name" placeholder="Nome do produto">
<input id="qty" type="number" placeholder="Quantidade">
<input id="image" type="file">

<button onclick="add()">Adicionar</button>

<hr>

<div id="list"></div>

</div>

<script>
let db = JSON.parse(localStorage.getItem("estoque") || "[]");

function save() {
  localStorage.setItem("estoque", JSON.stringify(db));
}

function add() {
  const name = document.getElementById("name").value;
  const qty = parseInt(document.getElementById("qty").value);
  const file = document.getElementById("image").files[0];

  if (!name || !qty) return alert("Preencha os campos");

  const reader = new FileReader();

  reader.onload = () => {
    db.push({
      id: Date.now(),
      name,
      qty,
      image: reader.result
    });
    save();
    render();
  };

  if (file) reader.readAsDataURL(file);
  else reader.onload();
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  if (db.length === 0) {
    list.innerHTML = "<p>Sem produtos no estoque</p>";
    return;
  }

  db.forEach(p => {
    list.innerHTML += `
      <div class="card">
        ${p.image ? `<img src="${p.image}">` : ""}
        <b>${p.name}</b>

        <div class="qtd-control">
          <button onclick="decrease(${p.id})">➖</button>
          <span><b>${p.qty}</b></span>
          <button onclick="increase(${p.id})">➕</button>
        </div>

        <button onclick="removeItem(${p.id})">Remover</button>
      </div>
    `;
  });
}

function increase(id) {
  db = db.map(p => {
    if (p.id === id) p.qty++;
    return p;
  });
  save();
  render();
}

function decrease(id) {
  db = db.map(p => {
    if (p.id === id && p.qty > 0) p.qty--;
    return p;
  });
  save();
  render();
}

function removeItem(id) {
  db = db.filter(p => p.id !== id);
  save();
  render();
}

render();

/* SERVICE WORKER */
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
