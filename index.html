<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="description" content="Controle de estoque salvo só neste dispositivo. Instale como app no celular ou use no PC." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Estoque" />
  <title>Gestão de estoque</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Instrument+Sans:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f4f6f9;
      --bg-elevated: #ffffff;
      --text: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --accent: #0d9488;
      --accent-hover: #0f766e;
      --accent-soft: rgba(13, 148, 136, 0.12);
      --danger: #dc2626;
      --danger-soft: rgba(220, 38, 38, 0.1);
      --warning: #d97706;
      --warning-soft: rgba(217, 119, 6, 0.12);
      --radius: 14px;
      --radius-sm: 10px;
      --shadow: 0 1px 2px rgba(15, 23, 42, 0.06), 0 8px 24px rgba(15, 23, 42, 0.06);
      --shadow-lg: 0 4px 6px rgba(15, 23, 42, 0.04), 0 24px 48px -12px rgba(15, 23, 42, 0.12);
      --font: "DM Sans", system-ui, sans-serif;
      --font-display: "Instrument Sans", var(--font);
    }

    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-font-smoothing: antialiased; }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.5;
      color: var(--text);
      background:
        radial-gradient(1200px 600px at 100% -10%, rgba(13, 148, 136, 0.08), transparent 55%),
        radial-gradient(900px 500px at -5% 20%, rgba(99, 102, 241, 0.06), transparent 50%),
        var(--bg);
    }

    .app {
      max-width: 1200px;
      margin: 0 auto;
      padding-top: max(1.25rem, env(safe-area-inset-top, 0px));
      padding-right: max(1.25rem, env(safe-area-inset-right, 0px));
      padding-bottom: max(3rem, env(safe-area-inset-bottom, 0px));
      padding-left: max(1.25rem, env(safe-area-inset-left, 0px));
    }

    header.top {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.75rem;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.875rem;
    }
    .brand img {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      object-fit: contain;
      background: var(--bg-elevated);
      box-shadow: var(--shadow);
    }
    .brand h1 {
      margin: 0;
      font-family: var(--font-display);
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .brand p {
      margin: 0.1rem 0 0;
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.45rem;
      padding: 0.65rem 1.1rem;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
    }
    .btn:active { transform: scale(0.98); }
    .btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 8px rgba(13, 148, 136, 0.35);
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-ghost {
      background: var(--bg-elevated);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--bg); }
    .btn-danger {
      background: var(--danger-soft);
      color: var(--danger);
    }
    .btn-danger:hover { filter: brightness(0.95); }
    .btn-sm { padding: 0.45rem 0.75rem; font-size: 0.8125rem; }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .stat-card {
      background: var(--bg-elevated);
      border-radius: var(--radius);
      padding: 1.1rem 1.2rem;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
    .stat-card .label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
    }
    .stat-card .value {
      margin-top: 0.35rem;
      font-family: var(--font-display);
      font-size: 1.65rem;
      font-weight: 700;
      letter-spacing: -0.03em;
    }
    .stat-card.warn .value { color: var(--warning); }

    .panel {
      background: var(--bg-elevated);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem 1.15rem;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #fafbfc 0%, var(--bg-elevated) 100%);
    }
    .toolbar-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem;
    }
    .search-wrap {
      flex: 1;
      min-width: 200px;
      position: relative;
    }
    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      color: var(--text-muted);
      pointer-events: none;
    }
    .search-wrap input {
      width: 100%;
      padding: 0.65rem 0.85rem 0.65rem 2.5rem;
      font: inherit;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .search-wrap input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .list {
      padding: 0;
      margin: 0;
      list-style: none;
    }
    .list li {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.75rem;
      align-items: center;
      padding: 1rem 1.15rem;
      border-bottom: 1px solid var(--border);
      transition: background 0.12s;
    }
    .list li:last-child { border-bottom: none; }
    .list li:hover { background: rgba(15, 23, 42, 0.02); }
    .item-main strong {
      display: block;
      font-weight: 600;
      font-size: 0.95rem;
    }
    .item-meta {
      font-size: 0.8125rem;
      color: var(--text-muted);
      margin-top: 0.2rem;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 0.2rem 0.5rem;
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-right: 0.35rem;
    }
    .badge.low {
      background: var(--warning-soft);
      color: var(--warning);
    }
    .badge.ok {
      background: var(--accent-soft);
      color: var(--accent-hover);
    }
    .item-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      justify-content: flex-end;
    }

    .empty {
      text-align: center;
      padding: 3rem 1.5rem;
      color: var(--text-muted);
    }
    .empty p { margin: 0.5rem 0 0; max-width: 320px; margin-left: auto; margin-right: auto; }

    .backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.45);
      backdrop-filter: blur(4px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      z-index: 40;
    }
    .backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -48%) scale(0.96);
      width: min(440px, calc(100% - 2rem));
      max-height: min(90dvh, 640px);
      overflow: auto;
      background: var(--bg-elevated);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 50;
    }
    .modal.open {
      opacity: 1;
      pointer-events: auto;
      transform: translate(-50%, -50%) scale(1);
    }
    .modal-head {
      padding: 1.25rem 1.25rem 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
    }
    .modal-head h2 {
      margin: 0;
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 700;
    }
    .modal-body { padding: 1rem 1.25rem 1.25rem; }
    .field {
      margin-bottom: 1rem;
    }
    .field label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 600;
      margin-bottom: 0.35rem;
      color: var(--text);
    }
    .field input, .field select {
      width: 100%;
      padding: 0.6rem 0.75rem;
      font: inherit;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg);
    }
    .field input:focus, .field select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }
    .modal-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: flex-end;
      margin-top: 1.25rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    @media (max-width: 520px) {
      .field-row { grid-template-columns: 1fr; }
      .list li {
        grid-template-columns: 1fr;
      }
      .item-actions { justify-content: flex-start; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="top">
      <div class="brand">
        <img src="logo.png" alt="" width="44" height="44" />
        <div>
          <h1>Estoque</h1>
          <p>Salvo só neste aparelho, faça backups regularmente.</p>
        </div>
      </div>
      <button type="button" class="btn btn-primary" id="btnNew">
        <span aria-hidden="true">+</span> Novo item
      </button>
    </header>

    <section class="stats" aria-label="Resumo">
      <div class="stat-card">
        <div class="label">Itens cadastrados</div>
        <div class="value" id="statTotal">0</div>
      </div>
      <div class="stat-card warn">
        <div class="label">Abaixo do mínimo</div>
        <div class="value" id="statLow">0</div>
      </div>
      <div class="stat-card">
        <div class="label">Unidades em estoque</div>
        <div class="value" id="statUnits">0</div>
      </div>
    </section>

    <div class="panel">
      <div class="toolbar">
        <div class="search-wrap">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
          <input type="search" id="search" placeholder="Buscar por nome ou código…" autocomplete="off" />
        </div>
        <div class="toolbar-actions">
          <button type="button" class="btn btn-ghost btn-sm" id="btnExport" title="Salvar cópia em arquivo JSON">
            Exportar backup
          </button>
          <button type="button" class="btn btn-ghost btn-sm" id="btnImport" title="Restaurar a partir de um arquivo JSON">
            Importar backup
          </button>
          <input type="file" id="importFile" accept=".json,application/json" hidden />
        </div>
      </div>
      <ul class="list" id="list" aria-live="polite"></ul>
      <div class="empty" id="empty" hidden>
        <strong id="emptyTitle">Nada por aqui ainda</strong>
        <p id="emptyText">Adicione o primeiro produto para começar a acompanhar quantidades e alertas de estoque mínimo.</p>
      </div>
    </div>
  </div>

  <div class="backdrop" id="backdrop" aria-hidden="true"></div>
  <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" aria-hidden="true">
    <div class="modal-head">
      <h2 id="modalTitle">Novo item</h2>
      <button type="button" class="btn btn-ghost btn-sm" id="btnCloseModal" aria-label="Fechar">Fechar</button>
    </div>
    <div class="modal-body">
      <form id="form">
        <input type="hidden" id="editId" />
        <div class="field">
          <label for="name">Nome</label>
          <input id="name" name="name" required maxlength="120" placeholder="Ex.: Creme hidratante 200g" />
        </div>
        <div class="field">
          <label for="code">Código / SKU</label>
          <input id="code" name="code" maxlength="40" placeholder="Opcional" />
        </div>
        <div class="field-row">
          <div class="field">
            <label for="qty">Quantidade</label>
            <input id="qty" name="qty" type="number" min="0" step="1" required value="0" />
          </div>
          <div class="field">
            <label for="min">Mínimo (alerta)</label>
            <input id="min" name="min" type="number" min="0" step="1" required value="5" />
          </div>
        </div>
        <div class="field">
          <label for="unit">Unidade</label>
          <select id="unit" name="unit">
            <option value="un">un</option>
            <option value="cx">cx</option>
            <option value="kg">kg</option>
            <option value="g">g</option>
            <option value="L">L</option>
            <option value="ml">ml</option>
          </select>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="btnCancel">Cancelar</button>
          <button type="submit" class="btn btn-primary" id="btnSave">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    (function () {
      const LEGACY_LS_KEY = "natura-stock-v1";
      const IDB_NAME = "natura-stock-app";
      const IDB_VERSION = 1;
      const IDB_STORE = "kv";
      const IDB_ITEMS_KEY = "items";

      let items = [];

      const $ = (id) => document.getElementById(id);
      const listEl = $("list");
      const emptyEl = $("empty");
      const searchEl = $("search");
      const backdrop = $("backdrop");
      const modal = $("modal");
      const form = $("form");
      const editId = $("editId");
      const modalTitle = $("modalTitle");

      function idbOpen() {
        return new Promise((resolve, reject) => {
          const req = indexedDB.open(IDB_NAME, IDB_VERSION);
          req.onerror = () => reject(req.error);
          req.onsuccess = () => resolve(req.result);
          req.onupgradeneeded = (e) => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains(IDB_STORE)) {
              db.createObjectStore(IDB_STORE);
            }
          };
        });
      }

      function idbGet(key) {
        return idbOpen().then(
          (db) =>
            new Promise((resolve, reject) => {
              const tx = db.transaction(IDB_STORE, "readonly");
              const g = tx.objectStore(IDB_STORE).get(key);
              g.onsuccess = () => resolve(g.result);
              g.onerror = () => reject(g.error);
            })
        );
      }

      function idbSet(key, value) {
        return idbOpen().then(
          (db) =>
            new Promise((resolve, reject) => {
              const tx = db.transaction(IDB_STORE, "readwrite");
              tx.oncomplete = () => resolve();
              tx.onerror = () => reject(tx.error);
              tx.objectStore(IDB_STORE).put(value, key);
            })
        );
      }

      async function load() {
        items = [];
        if ("indexedDB" in window) {
          try {
            const raw = await idbGet(IDB_ITEMS_KEY);
            if (Array.isArray(raw)) {
              items = raw;
              try {
                localStorage.removeItem(LEGACY_LS_KEY);
              } catch (_) {}
              return;
            }
          } catch (_) {}
        }
        try {
          const legacy = localStorage.getItem(LEGACY_LS_KEY);
          if (legacy) {
            const parsed = JSON.parse(legacy);
            if (Array.isArray(parsed)) {
              items = parsed;
              await save();
              return;
            }
          }
        } catch (_) {}
      }

      async function save() {
        const copy = items.slice();
        let usedIdb = false;
        if ("indexedDB" in window) {
          try {
            await idbSet(IDB_ITEMS_KEY, copy);
            usedIdb = true;
            try {
              localStorage.removeItem(LEGACY_LS_KEY);
            } catch (_) {}
          } catch (_) {}
        }
        if (!usedIdb) {
          try {
            localStorage.setItem(LEGACY_LS_KEY, JSON.stringify(copy));
          } catch (_) {}
        }
      }

      function uid() {
        return "id-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 8);
      }

      function openModal(editing) {
        backdrop.classList.add("open");
        modal.classList.add("open");
        modal.setAttribute("aria-hidden", "false");
        backdrop.setAttribute("aria-hidden", "false");
        if (!editing) {
          modalTitle.textContent = "Novo item";
          editId.value = "";
          form.reset();
          $("qty").value = "0";
          $("min").value = "5";
        }
        $("name").focus();
      }

      function closeModal() {
        backdrop.classList.remove("open");
        modal.classList.remove("open");
        modal.setAttribute("aria-hidden", "true");
        backdrop.setAttribute("aria-hidden", "true");
      }

      function stats(filtered) {
        const data = filtered || items;
        const total = data.length;
        const low = data.filter((i) => Number(i.qty) <= Number(i.min)).length;
        const units = data.reduce((s, i) => s + Number(i.qty || 0), 0);
        $("statTotal").textContent = total;
        $("statLow").textContent = low;
        $("statUnits").textContent = units;
      }

      function render() {
        const q = (searchEl.value || "").trim().toLowerCase();
        const filtered = !q
          ? items
          : items.filter(
              (i) =>
                (i.name || "").toLowerCase().includes(q) ||
                (i.code || "").toLowerCase().includes(q)
            );

        stats(filtered);
        listEl.innerHTML = "";

        if (filtered.length === 0) {
          emptyEl.hidden = false;
          if (items.length === 0) {
            $("emptyTitle").textContent = "Nada por aqui ainda";
            $("emptyText").textContent =
              "Adicione o primeiro produto para começar a acompanhar quantidades e alertas de estoque mínimo.";
          } else {
            $("emptyTitle").textContent = "Nenhum resultado";
            $("emptyText").textContent = "Tente outro termo na busca ou limpe o campo de pesquisa.";
          }
          return;
        }
        emptyEl.hidden = true;

        filtered
          .slice()
          .sort((a, b) => (a.name || "").localeCompare(b.name || "", "pt-BR"))
          .forEach((i) => {
            const low = Number(i.qty) <= Number(i.min);
            const li = document.createElement("li");
            li.innerHTML = `
              <div class="item-main">
                <strong>${escapeHtml(i.name)}</strong>
                <div class="item-meta">
                  <span class="badge ${low ? "low" : "ok"}">${low ? "Atenção" : "OK"}</span>
                  ${i.code ? `<span>Código: ${escapeHtml(i.code)}</span> · ` : ""}
                  <span>${Number(i.qty)} ${escapeHtml(i.unit || "un")}</span>
                  · mín. ${Number(i.min)}
                </div>
              </div>
              <div class="item-actions">
                <button type="button" class="btn btn-ghost btn-sm" data-act="minus" data-id="${escapeAttr(i.id)}">−1</button>
                <button type="button" class="btn btn-ghost btn-sm" data-act="plus" data-id="${escapeAttr(i.id)}">+1</button>
                <button type="button" class="btn btn-ghost btn-sm" data-act="edit" data-id="${escapeAttr(i.id)}">Editar</button>
                <button type="button" class="btn btn-danger btn-sm" data-act="del" data-id="${escapeAttr(i.id)}">Excluir</button>
              </div>
            `;
            listEl.appendChild(li);
          });
      }

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }
      function escapeAttr(s) {
        return escapeHtml(s).replace(/'/g, "&#39;");
      }

      function normalizeImportedRow(raw) {
        if (!raw || typeof raw !== "object") return null;
        const name = String(raw.name || "").trim();
        if (!name) return null;
        return {
          id: typeof raw.id === "string" && raw.id.trim() ? raw.id.trim() : uid(),
          name,
          code: String(raw.code || "").trim(),
          qty: Math.max(0, parseInt(String(raw.qty), 10) || 0),
          min: Math.max(0, parseInt(String(raw.min), 10) || 0),
          unit: String(raw.unit || "un"),
        };
      }

      function parseBackupJson(text) {
        const trimmed = String(text || "").replace(/^\uFEFF/, "");
        const data = JSON.parse(trimmed);
        let arr;
        if (Array.isArray(data)) arr = data;
        else if (data && Array.isArray(data.items)) arr = data.items;
        else throw new Error("O arquivo precisa ser um JSON com uma lista em items ou um array de produtos.");
        const seen = new Set();
        const out = [];
        for (const raw of arr) {
          let row = normalizeImportedRow(raw);
          if (!row) continue;
          while (seen.has(row.id)) row = { ...row, id: uid() };
          seen.add(row.id);
          out.push(row);
        }
        return out;
      }

      function exportBackup() {
        const payload = {
          version: 1,
          exportedAt: new Date().toISOString(),
          items: items.slice(),
        };
        const blob = new Blob([JSON.stringify(payload, null, 2)], {
          type: "application/json;charset=utf-8",
        });
        const a = document.createElement("a");
        const day = new Date().toISOString().slice(0, 10);
        a.href = URL.createObjectURL(blob);
        a.download = `estoque-backup-${day}.json`;
        a.rel = "noopener";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(a.href);
      }

      listEl.addEventListener("click", (e) => {
        const btn = e.target.closest("button[data-act]");
        if (!btn) return;
        const id = btn.getAttribute("data-id");
        const act = btn.getAttribute("data-act");
        const idx = items.findIndex((x) => x.id === id);
        if (idx < 0) return;

        (async () => {
          if (act === "del") {
            if (confirm("Excluir este item?")) {
              items.splice(idx, 1);
              await save();
              render();
            }
            return;
          }
          if (act === "plus") {
            items[idx].qty = Math.max(0, Number(items[idx].qty) + 1);
            await save();
            render();
            return;
          }
          if (act === "minus") {
            items[idx].qty = Math.max(0, Number(items[idx].qty) - 1);
            await save();
            render();
            return;
          }
          if (act === "edit") {
            const i = items[idx];
            editId.value = i.id;
            modalTitle.textContent = "Editar item";
            $("name").value = i.name || "";
            $("code").value = i.code || "";
            $("qty").value = String(i.qty ?? 0);
            $("min").value = String(i.min ?? 0);
            $("unit").value = i.unit || "un";
            openModal(true);
          }
        })();
      });

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const id = editId.value;
        const row = {
          id: id || uid(),
          name: $("name").value.trim(),
          code: $("code").value.trim(),
          qty: Math.max(0, parseInt($("qty").value, 10) || 0),
          min: Math.max(0, parseInt($("min").value, 10) || 0),
          unit: $("unit").value,
        };
        if (!row.name) return;

        (async () => {
          if (id) {
            const idx = items.findIndex((x) => x.id === id);
            if (idx >= 0) items[idx] = { ...items[idx], ...row };
          } else {
            items.push(row);
          }
          await save();
          closeModal();
          render();
        })();
      });

      $("btnExport").addEventListener("click", () => exportBackup());

      $("btnImport").addEventListener("click", () => $("importFile").click());

      $("importFile").addEventListener("change", (e) => {
        const input = e.target;
        const file = input.files && input.files[0];
        input.value = "";
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async () => {
          try {
            const next = parseBackupJson(String(reader.result || ""));
            const msg =
              next.length === 0
                ? "O arquivo não contém itens válidos. Isso vai apagar todo o estoque atual. Continuar?"
                : "Substituir todo o estoque atual pelo conteúdo do backup? Não dá para desfazer.";
            if (!confirm(msg)) return;
            items = next;
            await save();
            render();
            alert("Backup importado.");
          } catch (err) {
            alert("Não foi possível importar: " + (err.message || "arquivo inválido."));
          }
        };
        reader.onerror = () => alert("Não foi possível ler o arquivo.");
        reader.readAsText(file, "utf-8");
      });

      $("btnNew").addEventListener("click", () => openModal(false));
      $("btnCloseModal").addEventListener("click", closeModal);
      $("btnCancel").addEventListener("click", closeModal);
      backdrop.addEventListener("click", closeModal);
      searchEl.addEventListener("input", () => render());

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && modal.classList.contains("open")) {
          e.preventDefault();
          closeModal();
        }
      });

      function registerServiceWorker() {
        if (!("serviceWorker" in navigator)) return;
        const ok =
          location.protocol === "https:" ||
          location.hostname === "localhost" ||
          location.hostname === "127.0.0.1";
        if (!ok) return;
        navigator.serviceWorker.register("sw.js", { scope: "./" }).catch(() => {});
      }

      (async function init() {
        await load();
        if (navigator.storage && navigator.storage.persist) {
          navigator.storage.persist().catch(() => {});
        }
        render();
        registerServiceWorker();
      })();
    })();
  </script>
</body>
</html>
